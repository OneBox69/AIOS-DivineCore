name: divinecore-v2 CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'divinecore-v2/**'
      - 'sales_os/**'
      - 'ops_os/**'
      - 'branding_os/**'
      - '.github/workflows/divinecore-v2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'divinecore-v2/**'
      - 'sales_os/**'
      - 'ops_os/**'
      - 'branding_os/**'
      - '.github/workflows/divinecore-v2-ci.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: onebox69/aios-divinecore

jobs:
  build-and-push:
    name: Build & push (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: api
            dockerfile: divinecore-v2/api/Dockerfile
          - name: worker
            dockerfile: divinecore-v2/worker/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.component.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}

  notify:
    name: Notify Discord
    needs: build-and-push
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post status to Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ needs.build-and-push.result }}
          title: "divinecore-v2 build"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.event.head_commit.message }}`
          username: GitHub Actions
