<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Upwork Proposal Generator — DivineCore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font: 15px/1.5 system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    p.lede { color: #555; margin-top: 0; }
    textarea { width: 100%; min-height: 320px; padding: 12px; font: 14px/1.5 ui-monospace, monospace; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 10px 20px; font-size: 15px; background: #111; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
    button:hover { background: #333; }
    .note { color: #888; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Upwork Proposal Generator</h1>
  <p class="lede">Paste an Upwork job description. You'll get an application body, a proposal Doc, and a sales-script Doc.</p>
  <form method="post" action="/upwork">
    <textarea name="job_description" placeholder="Paste the Upwork job description here..." autofocus required></textarea>
    <button type="submit">Generate</button>
  </form>
  <p class="note">Pipeline takes ~60–120s. The page will block until everything's ready.</p>
</body>
</html>
