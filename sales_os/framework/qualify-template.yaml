# ─────────────────────────────────────────────────────────────────────────────
# QUALIFY TEMPLATE — Fill in for any ICP
# Used by: execution/scrape/filter-leads.py (automated checks)
#          and by researchers during manual Phase 2a/2b
# ─────────────────────────────────────────────────────────────────────────────
# INSTRUCTIONS
#   1. Affordability indicators — proof the company can afford your service
#   2. Buy signals — observable signs they need your specific product
#   3. Disqualify — hard rules that make a lead unworkable
#
#   For each buy signal, map it to YOUR product/service offering.
#   The more specific the signal, the better the email opener.
# ─────────────────────────────────────────────────────────────────────────────

name: <FILL_IN>               # e.g. "Plumbing Companies Qualification (US)"
description: <FILL_IN>        # one sentence describing what a good lead looks like

# ── AFFORDABILITY INDICATORS ─────────────────────────────────────────────────
# Proof that this company has money / can pay for your service.
# Set min_required to 2 for a balanced bar (not too strict, not too loose).
affordability_indicators:
  min_required: 2
  checks:
    # Replace all of these with indicators relevant to your ICP:
    - professional_website_with_own_domain    # not just a Yelp / directory listing
    - visible_pricing_above_<FILL_IN>         # e.g. "visible_pricing_above_500_usd"
    - paid_ads_running                        # Google / Meta ads = spending money on growth
    - active_social_media_presence            # own account with regular posts
    - own_branded_vehicle_or_facility         # physical asset = not a sole trader
    # Add your own:
    # - <FILL_IN>

# ── BUY SIGNALS ──────────────────────────────────────────────────────────────
# Observable signs on their website / social / listings that they need YOUR product.
# Each signal maps to a specific product/service you sell.
# These become the "opener line" in the cold email — the more specific, the better.
buy_signals:
  # --- Signal type: pain_fwd_reception ---
  # They're missing after-hours / instant response capability
  - signal: no_live_chat_or_booking_widget_on_website
    your_product: <FILL_IN>   # e.g. "AI Receptionist — captures inquiries 24/7"

  - signal: phone_only_contact_no_online_form
    your_product: <FILL_IN>   # e.g. "AI Receptionist — no missed calls after hours"

  # --- Signal type: pain_fwd_reactivation ---
  # They have an existing customer base that's going cold
  - signal: company_founded_more_than_10_years_ago
    your_product: <FILL_IN>   # e.g. "Database Reactivation — re-engage old customers"

  - signal: large_customer_or_client_count_visible_on_site
    your_product: <FILL_IN>   # e.g. "Database Reactivation — dormant customer winback"

  # --- Signal type: pain_fwd_speed ---
  # They're spending on ads but may be losing leads to slow response
  - signal: running_paid_ads_google_or_meta
    your_product: <FILL_IN>   # e.g. "Speed-to-Lead — respond within 60 seconds"

  # --- Signal type: pain_fwd_upsell ---
  # They have a broad offering but no visible cross-sell system
  - signal: wide_service_menu_no_visible_cross_sell
    your_product: <FILL_IN>   # e.g. "Upsell Automation — proactive follow-up on existing clients"

  # Add your own signals:
  # - signal: <FILL_IN>
  #   your_product: <FILL_IN>

# ── DISQUALIFY ───────────────────────────────────────────────────────────────
# Hard rules — if any of these are true, drop the lead immediately.
disqualify:
  - <FILL_IN>   # e.g. "Franchise or chain location (not owner-operated)"
  - <FILL_IN>   # e.g. "PE-backed or investor-owned group"
  - <FILL_IN>   # e.g. "No own web presence — directory listing only"
  - <FILL_IN>   # e.g. "B2B supplier or distributor (not a service business)"
  - <FILL_IN>   # e.g. "Training academy or certification program"
  # Add more as you discover noise in your scrape results
