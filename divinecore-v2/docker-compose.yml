services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: divinecore-v2/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      # hot-reload mounts — mirror what the Dockerfile copies in
      - ./api:/app
      - ../sales_os:/app/sales_os

  worker:
    build:
      context: ..
      dockerfile: divinecore-v2/worker/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./worker:/app
      - ../sales_os:/app/sales_os
      - ../ops_os:/app/ops_os

  beat:
    build:
      context: ..
      dockerfile: divinecore-v2/worker/Dockerfile
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./worker:/app
      - ../sales_os:/app/sales_os
      - ../ops_os:/app/ops_os
