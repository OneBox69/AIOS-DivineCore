services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - divinecore

  api:
    image: ghcr.io/onebox69/aios-divinecore/api:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    image: ghcr.io/onebox69/aios-divinecore/worker:latest
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore

  beat:
    image: ghcr.io/onebox69/aios-divinecore/worker:latest
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore

networks:
  divinecore:
    driver: bridge
