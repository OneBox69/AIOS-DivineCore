services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - divinecore

  api:
    image: ghcr.io/onebox69/aios-divinecore/api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore
      - traefik
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.upwork.rule=Host(`upwork.srv1445995.hstgr.cloud`)
      - traefik.http.routers.upwork.entrypoints=web,websecure
      - traefik.http.routers.upwork.tls=true
      - traefik.http.routers.upwork.tls.certresolver=mytlschallenge
      - traefik.http.routers.upwork.middlewares=upwork-redirect@docker,upwork-auth@docker
      - traefik.http.middlewares.upwork-redirect.headers.SSLRedirect=true
      - traefik.http.middlewares.upwork-auth.basicauth.users=OneBox69:$$2y$$05$$zLYijFgcKFvjlTDw3nBiF.eLjOF8XspL.lB819UMTq8GH2rS/I55y
      - traefik.http.services.upwork.loadbalancer.server.port=8000

  worker:
    image: ghcr.io/onebox69/aios-divinecore/worker:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore

  beat:
    image: ghcr.io/onebox69/aios-divinecore/worker:latest
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore

networks:
  divinecore:
    driver: bridge
  traefik:
    external: true
    name: n8n_default
