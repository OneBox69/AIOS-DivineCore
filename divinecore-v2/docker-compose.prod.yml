services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - divinecore

  api:
    image: ghcr.io/onebox69/aios-divinecore/api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore
      - traefik
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    labels:
      # TLS via Traefik default cert (self-signed). LE rate-limited the *.hstgr.cloud
      # apex (25k certs in 7d). Browser shows a one-time "Not secure" warning per
      # device — click through, browser remembers the exception. To upgrade to a
      # trusted cert later, add `tls.certresolver=mytlschallenge` once LE quota opens
      # up, or migrate to a domain outside the rate-limited apex.
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      # Router A — protected app surfaces (existing /upwork + new /outreach dashboard).
      # Lower priority than the webhook router below so the webhook escapes basicauth.
      - traefik.http.routers.upwork.rule=Host(`upwork.srv1445995.hstgr.cloud`)
      - traefik.http.routers.upwork.priority=10
      - traefik.http.routers.upwork.entrypoints=websecure
      - traefik.http.routers.upwork.tls=true
      - traefik.http.routers.upwork.middlewares=upwork-auth@docker
      - traefik.http.middlewares.upwork-auth.basicauth.users=OneBox69:$$2y$$05$$zLYijFgcKFvjlTDw3nBiF.eLjOF8XspL.lB819UMTq8GH2rS/I55y
      - traefik.http.services.upwork.loadbalancer.server.port=8000
      # Router B — public Instantly webhook. No basicauth — Instantly can't auth.
      # Auth happens inside the FastAPI handler via the X-Webhook-Secret header.
      # Higher priority so it matches first for /instantly/webhook paths.
      - traefik.http.routers.instantly-webhook.rule=Host(`upwork.srv1445995.hstgr.cloud`) && PathPrefix(`/instantly/webhook`)
      - traefik.http.routers.instantly-webhook.priority=100
      - traefik.http.routers.instantly-webhook.entrypoints=websecure
      - traefik.http.routers.instantly-webhook.tls=true
      - traefik.http.routers.instantly-webhook.service=upwork

  worker:
    image: ghcr.io/onebox69/aios-divinecore/worker:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore

  beat:
    image: ghcr.io/onebox69/aios-divinecore/worker:latest
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - divinecore

networks:
  divinecore:
    driver: bridge
  traefik:
    external: true
    name: n8n_default
