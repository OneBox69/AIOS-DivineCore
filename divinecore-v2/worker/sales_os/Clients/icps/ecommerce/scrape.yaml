name: OAC ICP 2 — E-Commerce Fulfillment Operators
description: 3PL fulfillment providers running automated warehouses for multiple online retailers. 15,000-40,000 sqm.

phase: 1  # Active outreach now

seniority_level:
  - c_suite
  - vp
  - director
  - owner

filters:
  titles:
    include:
      - Country Manager
      - Managing Director
      - CEO
      - Head of Network Development
      - VP Real Estate
      - Head of Fulfillment
      - Director of Operations
      - COO
      - Head of Expansion
      - European Head of Expansion
      - Nordic Director
      - VP Logistics
      - Head of Supply Chain
    exclude:
      - Intern
      - Assistant
      - Junior
      - Warehouse Associate
      - Picker
      - Packer

  industries:
    include:
      - logistics & supply chain
      - warehousing
      - package/freight delivery
      - internet

  employee_count:
    min: 50
    max: 10000

  locations:
    - norway
    - sweden
    - denmark
    - finland

  company_keywords:
    include_any:
      - e-commerce fulfillment
      - fulfillment center
      - order fulfillment
      - 3PL fulfillment
      - automated warehouse
      - e-commerce logistics
      - last mile delivery
      - online retail logistics
      - parcel logistics
      - fulfillment services
    exclude_any:
      - software
      - SaaS
      - marketplace
      - dropshipping
      - consulting
      - web development
      - digital agency

  exclude_companies:
    chains:
      - COOP Norge
      - Amazon
