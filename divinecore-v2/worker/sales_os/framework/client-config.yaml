# ─────────────────────────────────────────────────────────────────────────────
# CLIENT CONFIG — One file per client deployment
# This is the single place where all client-specific settings live.
# The pipeline scripts read this instead of having IDs hardcoded.
# ─────────────────────────────────────────────────────────────────────────────

client_name: <FILL_IN>        # e.g. "acme-corp" — lowercase, hyphens only
region: <FILL_IN>             # "us" or "dach"
language: <FILL_IN>           # "en" or "de"
sender_name: <FILL_IN>        # e.g. "John Smith" — appears in email sign-off
sender_company: <FILL_IN>     # e.g. "Acme AI" — appears in email sign-off

# ── ICPs ─────────────────────────────────────────────────────────────────────
# Add one entry per ICP this client is targeting.
# Each ICP needs its own scrape config, qualify config, email template, and Sheet.
icps:
  - name: <FILL_IN>                           # e.g. "plumbing-us"
    sheet_id: <FILL_IN>                       # Google Sheet ID (from the URL)
    scrape_config: icps/<FILL_IN>/scrape.yaml
    qualify_config: icps/<FILL_IN>/qualify.yaml
    email_template: templates/<FILL_IN>-email.yaml
    master_tab: <FILL_IN>                     # Sheet tab name, e.g. "All Leads"
    scrape_client: <FILL_IN>                  # Apify client label, e.g. "acme-plumbing"

  # Add more ICPs:
  # - name: <FILL_IN>
  #   sheet_id: <FILL_IN>
  #   scrape_config: icps/<FILL_IN>/scrape.yaml
  #   qualify_config: icps/<FILL_IN>/qualify.yaml
  #   email_template: templates/<FILL_IN>-email.yaml
  #   master_tab: All Leads
  #   scrape_client: <FILL_IN>

# ── PAIN QUESTIONS ───────────────────────────────────────────────────────────
# The question appended to the opener line per signal type.
# Rewrite these to match your product offering and your ICP's language.
pain_questions:
  pain_fwd_reception: >
    <FILL_IN>
    # e.g. "Quick question — how do you handle inquiries that come in evenings or weekends?"

  pain_fwd_reactivation: >
    <FILL_IN>
    # e.g. "Quick question — how are you currently staying in touch with customers from 1-2 years ago?"

  pain_fwd_speed: >
    <FILL_IN>
    # e.g. "Quick question — what happens to new inquiries when no one's available to respond right away?"

  pain_fwd_upsell: >
    <FILL_IN>
    # e.g. "Quick question — how are you currently approaching existing customers about additional services?"

# ── COPY QUALITY GATE ────────────────────────────────────────────────────────
# The copy generation script runs these checks before writing to the Sheet.
# Emails that fail are logged as FAIL and skipped.
quality_gate:
  max_words: 150              # first_touch body word limit
  no_ai_mention: true         # block any email mentioning "AI" (except sender company name)
  # Add your own checks here if needed
