# ─────────────────────────────────────────────────────────────────────────────
# SCRAPE TEMPLATE — Fill in for any ICP
# Used by: execution/scrape/apify-scrape.py
# ─────────────────────────────────────────────────────────────────────────────
# INSTRUCTIONS
#   1. Replace every <FILL_IN> with your ICP-specific values
#   2. Delete any section you don't need (all sections are optional except name)
#   3. The more specific your filters, the better your match rate
# ─────────────────────────────────────────────────────────────────────────────

name: <FILL_IN>               # e.g. "Plumbing Companies (US)"
description: <FILL_IN>        # one sentence describing the ideal company
version: 1

# ── JOB TITLES ───────────────────────────────────────────────────────────────
# Target decision-makers who can actually say yes to your offer.
# Be specific — too broad = lots of noise.
filters:
  titles:
    include:
      - Owner
      - Founder
      - Co-Founder
      - CEO
      - President
      - Managing Director
      # Add role-specific titles below:
      # - <FILL_IN>

    exclude:
      # Roles that are NOT decision-makers for your offer:
      - Associate
      - Employee
      - Head of Marketing
      - Head of Sales
      - Office Manager
      - Practice Manager
      # Add your own exclusions:
      # - <FILL_IN>

# ── INDUSTRIES ───────────────────────────────────────────────────────────────
# Apollo industry tags. Use lowercase exactly as Apollo displays them.
# Find the right tags by searching your ICP manually in Apollo first.
  industries:
    include:
      - <FILL_IN>   # e.g. "construction", "legal services", "automotive"
      - <FILL_IN>

    exclude:
      # Industries that share keywords but are NOT your ICP:
      # - <FILL_IN>

# ── COMPANY SIZE ─────────────────────────────────────────────────────────────
# Employee count range. SMBs are typically 1–200.
  employee_count:
    min: 1        # adjust down if your ICP includes solo operators
    max: 200      # adjust up if your ICP includes mid-market

# ── GEOGRAPHY ────────────────────────────────────────────────────────────────
# Country, state, city — be as specific as you need.
  locations:
    - <FILL_IN>   # e.g. "united states", "germany", "california"
    # Add more locations if targeting multiple regions:
    # - <FILL_IN>

# ── COMPANY KEYWORDS ─────────────────────────────────────────────────────────
# Words that appear in company names or descriptions on Apollo.
# include_any = OR logic (match any of these → include)
# exclude_any = OR logic (match any of these → exclude)
  company_keywords:
    include_any:
      # Core identity words for your ICP:
      - <FILL_IN>   # e.g. "plumbing", "plumber", "pipe repair"
      - <FILL_IN>
      # Secondary terms that also describe your ICP:
      # - <FILL_IN>

    exclude_any:
      # Noise — words that appear in your ICP keywords but belong to wrong companies:
      # - <FILL_IN>   # e.g. "plumbing supplies" (vendor, not service company)
      # - <FILL_IN>   # e.g. "plumbing school" (training, not target)

# ── COMPANY EXCLUSIONS ───────────────────────────────────────────────────────
  exclude_companies:
    # List specific chains / franchises / PE-backed groups to hard-exclude.
    # These are too large or not owner-operated — not a fit.
    chains:
      # - <FILL_IN>   # e.g. "ServiceMaster", "Mr. Rooter"

    # For human reference during manual qualify step only (not used by script):
    types:
      # - <FILL_IN>   # e.g. "Franchise location", "PE-backed roll-up"
      # - <FILL_IN>   # e.g. "B2B supplier / distributor"
